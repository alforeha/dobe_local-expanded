<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>code</title>
    <script>
      (function () {
        try {
          var s = JSON.parse(localStorage.getItem('cdb-system') || '{}');
          var mode = s.state && s.state.settings && s.state.settings.displayPreferences && s.state.settings.displayPreferences.mode;
          if (mode !== 'light') document.documentElement.classList.add('dark');
        } catch (_) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
